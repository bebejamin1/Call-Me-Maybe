<svg width="800" height="310" viewBox="0 0 800 310" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#57606a"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0969da"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#bc4c00"/>
    </marker>
  </defs>

  <rect width="800" height="310" fill="#ffffff"/>

  <!-- ─── PHASE 1 ─── -->
  <rect x="10" y="10" width="780" height="132" rx="10" fill="#f6f8fa" stroke="#0969da" stroke-width="1.5"/>
  <rect x="10" y="10" width="780" height="32"  rx="10" fill="#ddf4ff" stroke="none"/>
  <rect x="10" y="30" width="780" height="12"  fill="#ddf4ff" stroke="none"/>
  <text x="24" y="31" font-size="12" font-weight="700" fill="#0550ae">Phase 1 — Function Name via Trie</text>
  <text x="400" y="31" text-anchor="middle" font-size="10" fill="#57606a">Greedy decoding constrained to valid trie continuations</text>

  <!-- Step 1 box -->
  <rect x="24" y="50" width="190" height="82" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="119" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#57606a">Current sequence</text>
  <text x="119" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#24292f" font-family="monospace">[ ]</text>
  <text x="119" y="103" text-anchor="middle" font-size="9.5" fill="#8c959f">Trie valid next tokens:</text>
  <text x="119" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#1f883d">fn_  |  no</text>

  <!-- Arrow -->
  <line x1="215" y1="91" x2="252" y2="91" stroke="#0969da" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Step 2 box -->
  <rect x="252" y="50" width="190" height="82" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="347" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#57606a">Select → <tspan font-family="monospace" fill="#0969da">fn_</tspan></text>
  <text x="347" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#24292f" font-family="monospace">[fn_]</text>
  <text x="347" y="103" text-anchor="middle" font-size="9.5" fill="#8c959f">Trie valid next tokens:</text>
  <text x="347" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#1f883d">add  greet  reverse  get  sub…</text>

  <!-- Arrow -->
  <line x1="443" y1="91" x2="480" y2="91" stroke="#0969da" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Step 3 box -->
  <rect x="480" y="50" width="190" height="82" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="575" y="67" text-anchor="middle" font-size="10" font-weight="600" fill="#57606a">Select → <tspan font-family="monospace" fill="#0969da">add</tspan></text>
  <text x="575" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#24292f" font-family="monospace">[fn_][add]</text>
  <text x="575" y="103" text-anchor="middle" font-size="9.5" fill="#8c959f">Trie valid next tokens:</text>
  <text x="575" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#1f883d">_numbers</text>

  <!-- Arrow -->
  <line x1="671" y1="91" x2="705" y2="91" stroke="#0969da" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Result pill -->
  <rect x="705" y="68" width="75" height="46" rx="6" fill="#dafbe1" stroke="#1f883d" stroke-width="1.5"/>
  <text x="742" y="87"  text-anchor="middle" font-size="9.5"  font-weight="700" fill="#116329">Complete!</text>
  <text x="742" y="103" text-anchor="middle" font-size="8.5"  fill="#57606a" font-family="monospace">fn_add_</text>
  <text x="742" y="113" text-anchor="middle" font-size="8.5"  fill="#57606a" font-family="monospace">numbers</text>

  <!-- Masked tokens note -->
  <text x="400" y="147" text-anchor="middle" font-size="10" fill="#cf222e">All other tokens (e.g. "the", "hello", "42"…) are masked to −∞ at every step</text>

  <!-- ─── PHASE 2 ─── -->
  <rect x="10" y="158" width="780" height="142" rx="10" fill="#f6f8fa" stroke="#bc4c00" stroke-width="1.5"/>
  <rect x="10" y="158" width="780" height="32"  rx="10" fill="#ffd8b2" stroke="none"/>
  <rect x="10" y="178" width="780" height="12"  fill="#ffd8b2" stroke="none"/>
  <text x="24" y="179" font-size="12" font-weight="700" fill="#bc4c00">Phase 2 — Argument Values via Type Mask</text>
  <text x="400" y="179" text-anchor="middle" font-size="10" fill="#57606a">Allowed tokens depend on the declared parameter type in functions_definition.json</text>

  <!-- Type table -->
  <!-- Header -->
  <rect x="24" y="197" width="370" height="90" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="55"  y="215" font-size="10" font-weight="700" fill="#57606a">Type</text>
  <text x="200" y="215" font-size="10" font-weight="700" fill="#57606a">Allowed token characters</text>
  <line x1="34" y1="220" x2="384" y2="220" stroke="#d0d7de" stroke-width="1"/>

  <text x="55"  y="237" font-size="10" font-family="monospace" fill="#0969da">number</text>
  <text x="200" y="237" font-size="10" fill="#24292f" font-family="monospace">0-9  .  +  -  e  E</text>

  <text x="55"  y="254" font-size="10" font-family="monospace" fill="#0969da">integer</text>
  <text x="200" y="254" font-size="10" fill="#24292f" font-family="monospace">0-9  -</text>

  <text x="55"  y="271" font-size="10" font-family="monospace" fill="#0969da">boolean</text>
  <text x="200" y="271" font-size="10" fill="#24292f" font-family="monospace">true  false  True  False</text>

  <text x="55"  y="288" font-size="10" font-family="monospace" fill="#0969da">string</text>
  <text x="200" y="288" font-size="10" fill="#57606a">all tokens (no restriction)</text>

  <!-- Arrow from table to example -->
  <line x1="395" y1="242" x2="432" y2="242" stroke="#bc4c00" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Example box -->
  <rect x="432" y="197" width="348" height="90" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <text x="606" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#57606a">Example: parameter <tspan font-family="monospace" fill="#0969da">a</tspan> (type: number)</text>
  <line x1="442" y1="220" x2="770" y2="220" stroke="#d0d7de" stroke-width="1"/>

  <text x="442" y="237" font-size="9.5" fill="#57606a">Generated so far:</text>
  <text x="550" y="237" font-size="9.5" font-family="monospace" fill="#24292f">fn_add_numbers@a:</text>

  <!-- Token grid: valid vs masked -->
  <rect x="442" y="246" width="38" height="18" rx="3" fill="#dafbe1" stroke="#1f883d" stroke-width="1"/>
  <text x="461" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#116329">"2"</text>

  <rect x="484" y="246" width="38" height="18" rx="3" fill="#dafbe1" stroke="#1f883d" stroke-width="1"/>
  <text x="503" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#116329">"3."</text>

  <rect x="526" y="246" width="46" height="18" rx="3" fill="#dafbe1" stroke="#1f883d" stroke-width="1"/>
  <text x="549" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#116329">"-1e"</text>

  <rect x="576" y="246" width="52" height="18" rx="3" fill="#ffebe9" stroke="#cf222e" stroke-width="1"/>
  <text x="602" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#cf222e" text-decoration="line-through">"hello"</text>

  <rect x="632" y="246" width="40" height="18" rx="3" fill="#ffebe9" stroke="#cf222e" stroke-width="1"/>
  <text x="652" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#cf222e" text-decoration="line-through">"the"</text>

  <rect x="676" y="246" width="40" height="18" rx="3" fill="#ffebe9" stroke="#cf222e" stroke-width="1"/>
  <text x="696" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#cf222e" text-decoration="line-through">"is"</text>

  <rect x="720" y="246" width="40" height="18" rx="3" fill="#ffebe9" stroke="#cf222e" stroke-width="1"/>
  <text x="740" y="259" text-anchor="middle" font-size="9.5" font-family="monospace" fill="#cf222e" text-decoration="line-through">"…"</text>

  <text x="442" y="283" font-size="9.5" fill="#1f883d" font-weight="600">✓ allowed</text>
  <text x="576" y="283" font-size="9.5" fill="#cf222e" font-weight="600">✗ masked to −∞</text>
  <text x="442" y="296" font-size="9.5" fill="#57606a">→ Greedy selects <tspan font-family="monospace" font-weight="700">"2"</tspan>  then <tspan font-family="monospace" font-weight="700">@</tspan> delimiter to move to param <tspan font-family="monospace" font-weight="700">b</tspan></text>
</svg>
