<svg width="800" height="170" viewBox="0 0 800 170" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#57606a"/>
    </marker>
  </defs>

  <rect width="800" height="170" fill="#ffffff"/>

  <!-- Step labels -->
  <text x="95"  y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#8c959f" letter-spacing="1.5">INPUT</text>
  <text x="275" y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#8c959f" letter-spacing="1.5">MODEL</text>
  <text x="490" y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#8c959f" letter-spacing="1.5">CONSTRAINT</text>
  <text x="705" y="18" text-anchor="middle" font-size="9" font-weight="700" fill="#8c959f" letter-spacing="1.5">OUTPUT</text>

  <!-- Box 1 — Prompt -->
  <rect x="20" y="30" width="150" height="100" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="95" y="60"  text-anchor="middle" font-size="13" font-weight="700" fill="#0969da">Prompt</text>
  <line x1="35" y1="68" x2="155" y2="68" stroke="#d0d7de" stroke-width="1"/>
  <text x="95" y="85"  text-anchor="middle" font-size="11" fill="#57606a">"What is 2 + 3?"</text>
  <text x="95" y="105" text-anchor="middle" font-size="10" fill="#8c959f">Natural language input</text>
  <text x="95" y="122" text-anchor="middle" font-size="10" fill="#8c959f">→ tokenized for model</text>

  <!-- Arrow 1 -->
  <line x1="171" y1="80" x2="208" y2="80" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2 — LLM -->
  <rect x="208" y="20" width="135" height="120" rx="8" fill="#f6f8fa" stroke="#0969da" stroke-width="1.5"/>
  <text x="275" y="48"  text-anchor="middle" font-size="13" font-weight="700" fill="#0550ae">Qwen3-0.6B</text>
  <line x1="223" y1="56" x2="328" y2="56" stroke="#0969da" stroke-width="0.75" opacity="0.6"/>
  <text x="275" y="73"  text-anchor="middle" font-size="11" fill="#57606a">Language Model</text>
  <text x="275" y="91"  text-anchor="middle" font-size="10" fill="#57606a">Outputs logits for</text>
  <text x="275" y="107" text-anchor="middle" font-size="10" fill="#57606a">all ~150k vocab</text>
  <text x="275" y="124" text-anchor="middle" font-size="10" fill="#8c959f">tokens per step</text>

  <!-- Arrow 2 -->
  <line x1="344" y1="80" x2="381" y2="80" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3 — Constrained Decoder -->
  <rect x="381" y="10" width="218" height="150" rx="8" fill="#fffbdd" stroke="#d4a72c" stroke-width="1.5"/>
  <text x="490" y="36"  text-anchor="middle" font-size="13" font-weight="700" fill="#9a6700">Constrained Decoder</text>
  <line x1="396" y1="44" x2="584" y2="44" stroke="#d4a72c" stroke-width="0.75" opacity="0.6"/>
  <text x="490" y="62"  text-anchor="middle" font-size="10.5" fill="#57606a">Masks invalid tokens to −∞</text>

  <!-- Phase 1 pill -->
  <rect x="405" y="74" width="170" height="34" rx="6" fill="#ddf4ff" stroke="#0969da" stroke-width="1"/>
  <text x="490" y="88"  text-anchor="middle" font-size="10.5" font-weight="700" fill="#0550ae">Phase 1 — Trie</text>
  <text x="490" y="102" text-anchor="middle" font-size="9.5" fill="#57606a">Function name selection</text>

  <!-- Phase 2 pill -->
  <rect x="405" y="115" width="170" height="34" rx="6" fill="#ffd8b2" stroke="#bc4c00" stroke-width="1"/>
  <text x="490" y="129" text-anchor="middle" font-size="10.5" font-weight="700" fill="#bc4c00">Phase 2 — Type mask</text>
  <text x="490" y="143" text-anchor="middle" font-size="9.5" fill="#57606a">Argument value generation</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="85" x2="637" y2="85" stroke="#57606a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4 — Output -->
  <rect x="637" y="20" width="143" height="120" rx="8" fill="#dafbe1" stroke="#1f883d" stroke-width="1.5"/>
  <text x="708" y="47"  text-anchor="middle" font-size="13" font-weight="700" fill="#116329">JSON Output</text>
  <line x1="652" y1="55" x2="765" y2="55" stroke="#1f883d" stroke-width="0.75" opacity="0.5"/>
  <text x="708" y="72"  text-anchor="middle" font-size="10.5" fill="#57606a">fn_add_numbers</text>
  <text x="708" y="88"  text-anchor="middle" font-size="10"   fill="#57606a" font-style="italic">{ a: 2.0, b: 3.0 }</text>
  <text x="708" y="110" text-anchor="middle" font-size="11"   font-weight="700" fill="#116329">✓ 100% valid</text>
  <text x="708" y="126" text-anchor="middle" font-size="10"   fill="#8c959f">guaranteed by design</text>
</svg>
